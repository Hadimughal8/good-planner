name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform & build-tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Init project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/local-notifications @capacitor/assets
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.yourname.goodplanner",
            "appName": "Good Planner",
            "webDir": "www"
          }
          EOF

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync

      - name: Generate app icon & splash screen
        run: |
          npx @capacitor/assets generate --android --assetPath app-assets
          npx cap sync android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

      - name: Add exact-alarm & notification permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<\/manifest>/i\
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\
              <uses-permission android:name="android.permission.USE_EXACT_ALARM" />\
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\
              <uses-permission android:name="android.permission.VIBRATE" />\
              <uses-permission android:name="android.permission.WAKE_LOCK" />' "$MANIFEST"

      - name: Copy native alarm sources into the Android project
        run: |
          mkdir -p android/app/src/main/java/com/yourname/goodplanner/alarm
          cp native-alarm/alarm/*.kt android/app/src/main/java/com/yourname/goodplanner/alarm/
          mkdir -p android/app/src/main/res/layout
          cp native-alarm/res/layout/activity_alarm.xml android/app/src/main/res/layout/

      - name: Register alarm receiver/service/activity in manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i '/<\/application>/i\
              <receiver android:name=".alarm.AlarmReceiver" android:exported="false" />\
              <service android:name=".alarm.AlarmForegroundService" android:exported="false" android:foregroundServiceType="mediaPlayback" />\
              <activity android:name=".alarm.AlarmActivity" android:exported="false" android:launchMode="singleTask" android:theme="@style/Theme.AppCompat.NoActionBar" />' "$MANIFEST"
          cat "$MANIFEST"

      - name: Register AlarmScheduler plugin in MainActivity
        run: |
          cat > android/app/src/main/java/com/yourname/goodplanner/MainActivity.java << 'EOF'
          package com.yourname.goodplanner;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import com.yourname.goodplanner.alarm.AlarmSchedulerPlugin;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(AlarmSchedulerPlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF
          cat android/app/src/main/java/com/yourname/goodplanner/MainActivity.java

      - name: Show active Java version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: good-planner-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
